<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>الموقع قيد الصيانة</title>
<meta name="description" content="الموقع تحت الصيانة حالياً. سنعود قريباً.">
<meta name="theme-color" content="#070d16">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@200;300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070d16;
    --ink:#e8f0f8;
    --dim:#8aa3b8;
    --accent:#5eead4;
    --accent2:#818cf8;
    --glass:rgba(255,255,255,.045);
    --line:rgba(255,255,255,.09);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{height:100%}
  body{
    font-family:"IBM Plex Sans Arabic",system-ui,sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    min-height:100dvh;
    display:flex;align-items:center;justify-content:center;
    padding:
      calc(20px + env(safe-area-inset-top))
      calc(16px + env(safe-area-inset-right))
      calc(20px + env(safe-area-inset-bottom))
      calc(16px + env(safe-area-inset-left));
    position:relative;
    overflow-x:hidden;
  }

  .aurora{position:fixed;inset:-20%;pointer-events:none;filter:blur(80px);opacity:.55;z-index:0}
  .aurora span{position:absolute;border-radius:50%;mix-blend-mode:screen}
  .aurora span:nth-child(1){width:55vmax;height:55vmax;background:radial-gradient(circle, rgba(94,234,212,.28), transparent 65%);top:-15%;right:-10%;animation:drift1 26s ease-in-out infinite alternate}
  .aurora span:nth-child(2){width:50vmax;height:50vmax;background:radial-gradient(circle, rgba(129,140,248,.26), transparent 65%);bottom:-20%;left:-12%;animation:drift2 32s ease-in-out infinite alternate}
  .aurora span:nth-child(3){width:38vmax;height:38vmax;background:radial-gradient(circle, rgba(56,132,255,.18), transparent 65%);top:35%;left:30%;animation:drift3 40s ease-in-out infinite alternate}
  @keyframes drift1{to{transform:translate(-8vmax,10vmax) scale(1.15)}}
  @keyframes drift2{to{transform:translate(10vmax,-8vmax) scale(1.1)}}
  @keyframes drift3{to{transform:translate(-6vmax,-6vmax) scale(1.2)}}

  .stars{position:fixed;inset:0;pointer-events:none;z-index:0}
  .stars i{position:absolute;border-radius:50%;background:rgba(255,255,255,.5);animation:float linear infinite;box-shadow:0 0 6px rgba(255,255,255,.35)}
  @keyframes float{
    from{transform:translateY(105vh) scale(.6);opacity:0}
    12%{opacity:.7}
    88%{opacity:.7}
    to{transform:translateY(-8vh) scale(1);opacity:0}
  }

  .card{
    position:relative;z-index:1;
    width:min(600px, 100%);
    text-align:center;
    padding:clamp(40px, 8vw, 64px) clamp(20px, 6vw, 44px) clamp(36px, 7vw, 52px);
    border-radius:clamp(20px, 4vw, 28px);
    background:var(--glass);
    border:1px solid var(--line);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    box-shadow:0 30px 80px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.08);
    animation:card-in 1.1s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes card-in{from{opacity:0;transform:translateY(34px) scale(.97)}to{opacity:1;transform:none}}
  .card::before{
    content:"";position:absolute;inset:-1px;border-radius:inherit;padding:1px;
    background:conic-gradient(from var(--a,0deg), transparent 0 70%, rgba(94,234,212,.8) 82%, rgba(129,140,248,.8) 90%, transparent 100%);
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;
    animation:spin-edge 7s linear infinite;pointer-events:none;
  }
  @property --a{syntax:'<angle>';initial-value:0deg;inherits:false}
  @keyframes spin-edge{to{--a:360deg}}

  .gear-wrap{
    width:clamp(72px, 18vw, 104px);height:clamp(72px, 18vw, 104px);
    margin:0 auto clamp(20px, 4.5vw, 30px);
    position:relative;
    animation:rise .9s .15s cubic-bezier(.22,1,.36,1) both;
  }
  .gear-wrap::after{
    content:"";position:absolute;inset:-22%;border-radius:50%;
    background:radial-gradient(circle, rgba(94,234,212,.22), transparent 70%);
    animation:breathe 3.4s ease-in-out infinite;
  }
  @keyframes breathe{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.12)}}
  .gear-wrap svg{width:100%;height:100%;position:relative;z-index:1;display:block}
  .gear-big{transform-origin:50% 50%;animation:rot 14s linear infinite}
  .gear-small{transform-origin:73% 73%;animation:rot-rev 9s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}
  @keyframes rot-rev{to{transform:rotate(-360deg)}}

  .badge{
    display:inline-flex;align-items:center;gap:9px;
    font-size:clamp(11.5px, 3vw, 13px);font-weight:500;letter-spacing:.6px;
    color:var(--accent);
    border:1px solid rgba(94,234,212,.3);background:rgba(94,234,212,.07);
    padding:7px 16px;border-radius:999px;
    margin-bottom:clamp(18px, 4vw, 26px);
    animation:rise .9s .25s cubic-bezier(.22,1,.36,1) both;
    white-space:nowrap;
  }
  .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:pulse 1.8s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(94,234,212,.55)}50%{box-shadow:0 0 0 10px transparent}}

  h1{
    font-size:clamp(26px, 7vw, 50px);font-weight:700;line-height:1.4;
    margin-bottom:clamp(10px, 2.5vw, 16px);
    animation:rise .9s .35s cubic-bezier(.22,1,.36,1) both;
  }
  h1 .grad{
    background:linear-gradient(120deg, var(--accent), var(--accent2), var(--accent));
    background-size:220% auto;
    -webkit-background-clip:text;background-clip:text;color:transparent;
    animation:shimmer 5.5s ease-in-out infinite;
  }
  @keyframes shimmer{0%,100%{background-position:0% center}50%{background-position:100% center}}

  p.sub{
    color:var(--dim);
    font-size:clamp(14.5px, 3.8vw, 17px);font-weight:300;line-height:2;
    max-width:36ch;margin:0 auto clamp(26px, 6vw, 38px);
    animation:rise .9s .45s cubic-bezier(.22,1,.36,1) both;
  }

  .progress-zone{animation:rise .9s .55s cubic-bezier(.22,1,.36,1) both}
  .progress{
    height:7px;border-radius:999px;
    background:rgba(255,255,255,.06);border:1px solid var(--line);
    overflow:hidden;margin:0 auto 13px;width:min(340px, 88%);
  }
  .progress i{
    display:block;height:100%;width:45%;border-radius:999px;
    background:linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
    animation:scan 2.6s ease-in-out infinite;
  }
  @keyframes scan{0%{transform:translateX(130%)}100%{transform:translateX(-380%)}}
  .status{font-size:clamp(12px, 3.2vw, 13px);color:var(--dim);letter-spacing:.4px}
  .status b{color:var(--ink);font-weight:500}
  .status b::after{content:"";display:inline-block;animation:dots 1.8s steps(4) infinite}
  @keyframes dots{0%{content:""}25%{content:"."}50%{content:".."}75%{content:"..."}}

  .play-btn{
    display:inline-flex;align-items:center;gap:8px;
    margin-top:clamp(24px, 5vw, 34px);
    padding:9px 20px;
    font-family:inherit;
    font-size:clamp(12.5px, 3.2vw, 14px);font-weight:400;
    color:var(--dim);
    background:transparent;
    border:1px solid var(--line);
    border-radius:999px;
    cursor:pointer;
    transition:color .3s, border-color .3s, background .3s, transform .2s;
    animation:rise .9s .6s cubic-bezier(.22,1,.36,1) both;
    -webkit-tap-highlight-color:transparent;
  }
  .play-btn:hover, .play-btn:focus-visible{
    color:var(--accent);
    border-color:rgba(94,234,212,.4);
    background:rgba(94,234,212,.06);
  }
  .play-btn:active{transform:scale(.96)}
  .play-btn:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
  .play-btn svg{width:15px;height:15px;flex-shrink:0}

  footer{
    margin-top:clamp(22px, 4.5vw, 32px);
    font-size:clamp(11.5px, 3vw, 12.5px);
    color:var(--dim);opacity:.7;
    animation:rise .9s .65s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

  /* ===== نافذة اللعبة ===== */
  .game-overlay{
    position:fixed;inset:0;z-index:50;
    display:none;
    align-items:center;justify-content:center;
    padding:calc(12px + env(safe-area-inset-top)) 12px calc(12px + env(safe-area-inset-bottom));
    background:rgba(4,8,14,.82);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
  }
  .game-overlay.open{display:flex;animation:fade-in .3s ease both}
  @keyframes fade-in{from{opacity:0}to{opacity:1}}

  .game-box{
    width:min(580px, 100%);
    background:#0a1320;
    border:1px solid var(--line);
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 30px 90px rgba(0,0,0,.6);
    animation:pop-in .35s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes pop-in{from{opacity:0;transform:translateY(24px) scale(.96)}to{opacity:1;transform:none}}

  .game-head{
    display:flex;align-items:center;justify-content:space-between;
    gap:10px;
    padding:11px 14px;
    border-bottom:1px solid var(--line);
  }
  .game-title{font-size:14px;font-weight:500;color:var(--ink);display:flex;align-items:center;gap:7px;white-space:nowrap}
  .game-scores{font-size:12px;color:var(--dim);display:flex;gap:12px;white-space:nowrap}
  .game-scores b{color:var(--accent);font-weight:700;font-variant-numeric:tabular-nums}
  .head-btns{display:flex;gap:7px}
  .icon-btn{
    width:32px;height:32px;
    display:grid;place-items:center;
    background:transparent;border:1px solid var(--line);border-radius:10px;
    color:var(--dim);cursor:pointer;
    font-size:14px;line-height:1;
    transition:color .25s, border-color .25s;
    -webkit-tap-highlight-color:transparent;
    flex-shrink:0;
  }
  .icon-btn:hover, .icon-btn:focus-visible{color:var(--ink);border-color:rgba(255,255,255,.25)}
  .icon-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  #gameCanvas{
    display:block;width:100%;
    touch-action:manipulation;
    cursor:pointer;
    user-select:none;
    -webkit-user-select:none;
  }
  .game-hint{
    padding:9px 16px;
    text-align:center;
    font-size:11.5px;color:var(--dim);
    border-top:1px solid var(--line);
    min-height:35px;
    transition:color .3s;
  }
  .game-hint.gold{color:#ffd166}

  @media (max-height:480px) and (orientation:landscape){
    body{padding-top:16px;padding-bottom:16px}
    .card{padding:28px 32px 26px}
    .gear-wrap{width:56px;height:56px;margin-bottom:14px}
    h1{font-size:24px;margin-bottom:8px}
    p.sub{margin-bottom:18px;line-height:1.8}
    .play-btn{margin-top:14px}
    footer{margin-top:14px}
  }

  @media (max-width:600px){
    .aurora{filter:blur(55px)}
    .card{backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
    .game-scores span:nth-child(3){display:none} /* نخفي المسافة بالشاشات الضيقة */
  }

  @media (min-width:1800px){.card{width:min(660px,100%)}}

  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation:none !important}
    .progress i{width:100%;background:var(--accent);opacity:.45;transform:none}
    .card,.gear-wrap,.badge,h1,p.sub,.progress-zone,.play-btn,footer{opacity:1;transform:none}
    .game-overlay.open{display:flex}
  }
</style>
</head>
<body>

<div class="aurora" aria-hidden="true"><span></span><span></span><span></span></div>
<div class="stars" aria-hidden="true" id="stars"></div>

<main class="card">

  <div class="gear-wrap" aria-hidden="true">
    <svg viewBox="0 0 100 100" fill="none">
      <g class="gear-big">
        <path fill="rgba(94,234,212,.9)" d="M50 18l4.2 8.1a25 25 0 0 1 6.4 2.6l8.7-2.9 6.4 6.4-2.9 8.7a25 25 0 0 1 2.6 6.4L83.5 52l-8.1 4.2a25 25 0 0 1-2.6 6.4l2.9 8.7-6.4 6.4-8.7-2.9a25 25 0 0 1-6.4 2.6L50 85.5l-4.2-8.1a25 25 0 0 1-6.4-2.6l-8.7 2.9-6.4-6.4 2.9-8.7a25 25 0 0 1-2.6-6.4L16.5 52l8.1-4.2a25 25 0 0 1 2.6-6.4l-2.9-8.7 6.4-6.4 8.7 2.9a25 25 0 0 1 6.4-2.6L50 18z" opacity=".92"/>
        <circle cx="50" cy="51.75" r="11.5" fill="#070d16"/>
      </g>
      <g class="gear-small">
        <path fill="rgba(129,140,248,.95)" d="M73 60l2.4 4.6a14 14 0 0 1 3.6 1.5l5-1.7 3.6 3.6-1.7 5a14 14 0 0 1 1.5 3.6L92 79l-4.6 2.4a14 14 0 0 1-1.5 3.6l1.7 5-3.6 3.6-5-1.7a14 14 0 0 1-3.6 1.5L73 98l-2.4-4.6a14 14 0 0 1-3.6-1.5l-5 1.7-3.6-3.6 1.7-5a14 14 0 0 1-1.5-3.6L54 79l4.6-2.4a14 14 0 0 1 1.5-3.6l-1.7-5 3.6-3.6 5 1.7a14 14 0 0 1 3.6-1.5L73 60z"/>
        <circle cx="73" cy="79" r="6" fill="#070d16"/>
      </g>
    </svg>
  </div>

  <div class="badge"><span class="dot"></span> صيانة وتحسينات جارية</div>

  <h1>الموقع قيد <span class="grad">التطوير</span></h1>

  <p class="sub">
    الموقع تحت الصيانة حالياً.. سنعود قريباً إن شاء الله.
  </p>

  <div class="progress-zone">
    <div class="progress" role="progressbar" aria-label="جارٍ العمل"><i></i></div>
    <div class="status">الحالة: <b>جارٍ التحديث</b></div>
  </div>

  <button class="play-btn" id="playBtn" type="button">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3" fill="currentColor" stroke="none"/></svg>
    تگدر تلعب وانت تنتظر
  </button>

  <footer>شكراً لصبركم ✨</footer>
</main>

<!-- ===== نافذة اللعبة ===== -->
<div class="game-overlay" id="gameOverlay" role="dialog" aria-modal="true" aria-label="لعبة قفزة الترس">
  <div class="game-box">
    <div class="game-head">
      <div class="game-title">⚙️ قفزة الترس</div>
      <div class="game-scores">
        <span>النقاط <b id="score">0</b></span>
        <span>الأفضل <b id="best">0</b></span>
        <span>🔩 <b id="bolts">0</b></span>
      </div>
      <div class="head-btns">
        <button class="icon-btn" id="muteBtn" type="button" aria-label="كتم الصوت">🔊</button>
        <button class="icon-btn" id="closeBtn" type="button" aria-label="إغلاق اللعبة">✕</button>
      </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div class="game-hint" id="hint">اضغط للقفز • ضغطة ثانية بالهواء = قفزة مزدوجة</div>
  </div>
</div>

<script>
/* ===== نجوم الخلفية ===== */
if(!matchMedia('(prefers-reduced-motion: reduce)').matches){
  const wrap = document.getElementById('stars');
  const N = innerWidth < 600 ? 12 : 24;
  for(let k=0;k<N;k++){
    const s=document.createElement('i');
    const size=(Math.random()*2+1.2).toFixed(1);
    s.style.cssText=`left:${Math.random()*100}%;width:${size}px;height:${size}px;animation-duration:${(Math.random()*16+14).toFixed(1)}s;animation-delay:-${(Math.random()*20).toFixed(1)}s;opacity:0;`;
    wrap.appendChild(s);
  }
}

/* ============================================================
   قفزة الترس — النسخة القوية
   قفزة مزدوجة • صواميل تُجمع • قدرات (درع/مغناطيس/x2)
   درون طائر • بيئات تتغير ألوانها • أصوات مصنّعة • HUD
   ============================================================ */
(function(){
  const overlay=document.getElementById('gameOverlay');
  const playBtn=document.getElementById('playBtn');
  const closeBtn=document.getElementById('closeBtn');
  const muteBtn=document.getElementById('muteBtn');
  const canvas=document.getElementById('gameCanvas');
  const ctx=canvas.getContext('2d');
  const scoreEl=document.getElementById('score');
  const bestEl=document.getElementById('best');
  const boltsEl=document.getElementById('bolts');
  const hintEl=document.getElementById('hint');

  const ACCENT='#5eead4', ACCENT2='#818cf8', PINK='#f472b6', GOLD='#ffd166', DIM='#8aa3b8', RED='#fb7185';
  const TAU=Math.PI*2;
  const lerp=(a,b,t)=>a+(b-a)*t;

  /* ---------- التخزين ---------- */
  const store={
    get(k,d){ try{const v=localStorage.getItem(k);return v===null?d:JSON.parse(v)}catch(e){return d} },
    set(k,v){ try{localStorage.setItem(k,JSON.stringify(v))}catch(e){} }
  };
  let best=store.get('gj_best',0);
  let totalBolts=store.get('gj_bolts',0);
  let muted=store.get('gj_muted',false);
  bestEl.textContent=best;
  boltsEl.textContent=totalBolts;
  muteBtn.textContent=muted?'🔇':'🔊';

  /* ---------- الصوت (Web Audio مصنّع، بدون ملفات) ---------- */
  let AC=null;
  function audio(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)()}catch(e){} } if(AC&&AC.state==='suspended')AC.resume(); return AC; }
  function tone(freq,dur,type,vol,freqEnd){
    if(muted)return;
    const ac=audio(); if(!ac)return;
    const t=ac.currentTime;
    const o=ac.createOscillator(), g=ac.createGain();
    o.type=type||'sine';
    o.frequency.setValueAtTime(freq,t);
    if(freqEnd)o.frequency.exponentialRampToValueAtTime(freqEnd,t+dur);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol||.15,t+.008);
    g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    o.connect(g).connect(ac.destination);
    o.start(t); o.stop(t+dur+.02);
  }
  const sfx={
    jump(){ tone(300,.12,'square',.07,520) },
    djump(){ tone(430,.13,'square',.07,760) },
    land(){ tone(150,.06,'triangle',.06,90) },
    bolt(){ tone(880,.07,'sine',.09,1320); setTimeout(()=>tone(1320,.09,'sine',.07,1760),40) },
    power(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.12,'triangle',.09),i*70)) },
    shieldPop(){ tone(700,.18,'sawtooth',.09,180); tone(1400,.1,'sine',.05,700) },
    hit(){ tone(220,.3,'sawtooth',.12,60); tone(110,.35,'square',.08,40) },
    milestone(){ tone(660,.12,'triangle',.09); setTimeout(()=>tone(990,.16,'triangle',.09),90) },
  };
  muteBtn.addEventListener('click',()=>{
    muted=!muted;
    store.set('gj_muted',muted);
    muteBtn.textContent=muted?'🔇':'🔊';
    if(!muted)sfx.bolt();
  });

  /* ---------- القياسات ---------- */
  let W=0,H=0,DPR=1,GROUND=0;
  function resize(){
    const box=canvas.parentElement.getBoundingClientRect();
    const cssW=box.width;
    const cssH=Math.min(320,Math.max(215,innerHeight*0.45));
    DPR=Math.min(devicePixelRatio||1,2);
    canvas.width=Math.round(cssW*DPR);
    canvas.height=Math.round(cssH*DPR);
    canvas.style.height=cssH+'px';
    W=cssW;H=cssH;
    GROUND=H-40;
    ctx.setTransform(DPR,0,0,DPR,0,0);
    buildParallax();
  }

  /* ---------- البيئات (تتبدل كل 25 نقطة) ---------- */
  const BIOMES=[
    {top:[10,19,32], bot:[14,32,51],  far:[129,140,248], near:[94,234,212],  name:'الليل الأزرق'},
    {top:[26,15,46], bot:[52,24,74],  far:[192,132,252], near:[244,114,182], name:'الشفق البنفسجي'},
    {top:[10,31,28], bot:[16,54,47],  far:[52,211,153],  near:[253,224,71],  name:'الغابة الزمردية'},
    {top:[45,18,18], bot:[80,32,22],  far:[251,146,60],  near:[253,224,71],  name:'الغروب الناري'},
    {top:[8,10,14],  bot:[20,24,38],  far:[148,163,184], near:[125,211,252], name:'الفضاء العميق'},
  ];
  let biomeCur={top:[...BIOMES[0].top],bot:[...BIOMES[0].bot],far:[...BIOMES[0].far],near:[...BIOMES[0].near]};
  let biomeIdx=0;
  function updateBiome(dt){
    const target=BIOMES[Math.min(Math.floor(score/25),BIOMES.length-1)];
    const k=1-Math.pow(0.97,dt);
    ['top','bot','far','near'].forEach(key=>{
      for(let i=0;i<3;i++)biomeCur[key][i]=lerp(biomeCur[key][i],target[key][i],k);
    });
  }
  const rgba=(c,a)=>`rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`;

  /* ---------- parallax ---------- */
  let hillsFar=[],hillsNear=[],bgStars=[];
  function buildParallax(){
    bgStars=Array.from({length:28},()=>({
      x:Math.random()*W,y:Math.random()*GROUND*0.65,
      r:Math.random()*1.3+.4,tw:Math.random()*TAU,sp:.4+Math.random()*.8
    }));
    hillsFar=[];hillsNear=[];
    let x=0;
    while(x<W*2){const w=60+Math.random()*90;hillsFar.push({x,w,h:22+Math.random()*32});x+=w*.75}
    x=0;
    while(x<W*2){const w=45+Math.random()*70;hillsNear.push({x,w,h:12+Math.random()*20});x+=w*.7}
  }
  let farOff=0,nearOff=0;

  /* ---------- الحالة ---------- */
  let running=false,over=false,started=false;
  let score=0,runBolts=0,speed=0,dist=0,raf=0,lastT=0;
  let shake=0,flash=0,flashColor=GOLD;
  let gear,obstacles,bolts,powerups,particles,trail,popups;
  let shield=false,magnetT=0,x2T=0;

  const GRAV=0.55,JUMP_V=-10.6,DJUMP_V=-9.4,CUT=0.45;
  const COYOTE=6,BUFFER=7;
  let coyote=0,buffer=0,holding=false,jumpsUsed=0;

  function reset(){
    score=0;runBolts=0;dist=0;speed=4.4;
    over=false;started=false;
    shake=0;flash=0;
    coyote=0;buffer=0;holding=false;jumpsUsed=0;
    shield=false;magnetT=0;x2T=0;
    gear={x:78,y:GROUND,r:19,vy:0,rot:0,onGround:true,squash:0,inv:0};
    obstacles=[];bolts=[];powerups=[];particles=[];trail=[];popups=[];
    spawnTimer=30;boltTimer=140;powerTimer=500;
    biomeIdx=0;
    scoreEl.textContent='0';
    hintEl.classList.remove('gold');
    hintEl.textContent='اضغط للقفز • ضغطة ثانية بالهواء = قفزة مزدوجة';
  }

  /* ---------- الإدخال ---------- */
  function pressDown(){
    holding=true;
    audio();
    if(over){reset();started=true;return}
    if(!started){started=true;return}
    buffer=BUFFER;
  }
  function pressUp(){
    holding=false;
    if(gear.vy<0)gear.vy*=CUT;
  }
  function tryJump(){
    if(buffer<=0)return;
    if(gear.onGround||coyote>0){
      gear.vy=JUMP_V;gear.onGround=false;
      coyote=0;buffer=0;jumpsUsed=1;
      gear.squash=-1;
      burst(gear.x,GROUND+4,7,'rgba(138,163,184,.8)',2.4);
      sfx.jump();
    }else if(jumpsUsed<2){
      gear.vy=DJUMP_V;
      buffer=0;jumpsUsed=2;
      gear.squash=-1;
      // حلقة هواء للقفزة المزدوجة
      ringFx(gear.x,gear.y+gear.r*.7);
      sfx.djump();
    }
  }
  let rings=[];
  function ringFx(x,y){rings.push({x,y,r:6,life:1})}

  /* ---------- تأثيرات ---------- */
  function burst(x,y,n,color,power){
    for(let i=0;i<n;i++){
      particles.push({
        x,y,
        vx:(Math.random()-.5)*(power||3.2),
        vy:-Math.random()*(power||3)-.8,
        life:1,color,
        r:Math.random()*2.4+1
      });
    }
  }
  function popup(x,y,txt,color,size){
    popups.push({x,y,txt,color,life:1,size:size||15});
  }
  function addScore(n,x,y){
    const mult=x2T>0?2:1;
    const v=n*mult;
    score+=v;
    scoreEl.textContent=score;
    popup(x,y,'+'+v,x2T>0?GOLD:ACCENT,x2T>0?17:15);
    if(score>best){
      best=score;bestEl.textContent=best;
      store.set('gj_best',best);
    }
    const mile=Math.floor(score/25);
    if(mile>biomeIdx&&mile<BIOMES.length){
      biomeIdx=mile;
      flash=.6;flashColor=GOLD;
      popup(W/2,H*0.28,BIOMES[Math.min(mile,BIOMES.length-1)].name+' ✦',GOLD,18);
      sfx.milestone();
    }else if(score%10===0&&score>0){
      sfx.milestone();
    }
  }

  /* ---------- التوليد ---------- */
  let spawnTimer=0,boltTimer=0,powerTimer=0;
  const minGapPx=()=>195+speed*23;

  function spawnObstacle(){
    const roll=Math.random();
    if(roll<.42){
      const h=26+Math.random()*24;
      obstacles.push({x:W+40,w:20+Math.random()*16,h,kind:'box',passed:false});
    }else if(roll<.68){
      const r=13+Math.random()*8;
      obstacles.push({x:W+40,r,kind:'spike',rot:0,passed:false});
    }else if(roll<.85&&score>=8){
      // درون — يطير بمستوى الرأس، مرّ تحته أو اقفز فوقه بدقة
      obstacles.push({x:W+40,r:13,kind:'drone',baseY:GROUND-46-Math.random()*26,bob:Math.random()*TAU,passed:false});
    }else{
      const h=20+Math.random()*10;
      obstacles.push({x:W+40,w:16,h,kind:'box',passed:false});
      obstacles.push({x:W+40+58+speed*6,w:16,h:h+6,kind:'box',passed:false});
    }
  }
  function spawnBolts(){
    // قوس من الصواميل
    const n=3+(Math.random()*3|0);
    const baseY=GROUND-24-Math.random()*54;
    const arc=Math.random()<.5;
    for(let i=0;i<n;i++){
      bolts.push({
        x:W+40+i*26,
        y:arc?baseY-Math.sin((i/(n-1))*Math.PI)*26:baseY,
        r:8,rot:Math.random()*TAU,taken:false
      });
    }
  }
  function spawnPower(){
    const types=['shield','magnet','x2'];
    const kind=types[Math.random()*types.length|0];
    powerups.push({x:W+40,y:GROUND-40-Math.random()*46,kind,bob:Math.random()*TAU,r:12});
  }

  /* ---------- أشكال ---------- */
  function drawGearShape(x,y,r,rot,color,teeth,glow){
    ctx.save();
    ctx.translate(x,y);ctx.rotate(rot);
    if(glow){ctx.shadowColor=glow;ctx.shadowBlur=16}
    ctx.fillStyle=color;
    const n=teeth||8;
    ctx.beginPath();
    for(let i=0;i<n*2;i++){
      const rad=i%2===0?r:r*0.72;
      const a=(i/(n*2))*TAU;
      ctx.lineTo(Math.cos(a)*rad,Math.sin(a)*rad);
    }
    ctx.closePath();ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#0a1320';
    ctx.beginPath();ctx.arc(0,0,r*0.34,0,TAU);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.25)';
    ctx.beginPath();ctx.arc(-r*.3,-r*.3,r*.13,0,TAU);ctx.fill();
    ctx.restore();
  }
  function drawHex(x,y,r,rot,color){
    ctx.save();
    ctx.translate(x,y);ctx.rotate(rot);
    ctx.fillStyle=color;
    ctx.beginPath();
    for(let i=0;i<6;i++){
      const a=i/6*TAU;
      ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    }
    ctx.closePath();ctx.fill();
    ctx.fillStyle='#0a1320';
    ctx.beginPath();ctx.arc(0,0,r*.42,0,TAU);ctx.fill();
    ctx.restore();
  }
  function drawDrone(o){
    const y=o.baseY+Math.sin(o.bob)*7;
    ctx.save();
    ctx.translate(o.x,y);
    // جسم
    ctx.fillStyle=RED;
    ctx.shadowColor='rgba(251,113,133,.5)';ctx.shadowBlur=12;
    ctx.beginPath();ctx.roundRect(-13,-6,26,12,6);ctx.fill();
    ctx.shadowBlur=0;
    // عين
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(-4,0,3,0,TAU);ctx.fill();
    // مراوح
    ctx.strokeStyle='rgba(255,255,255,.7)';
    ctx.lineWidth=2;
    const sp=o.bob*6;
    for(const side of[-11,11]){
      ctx.beginPath();
      ctx.moveTo(side-7*Math.cos(sp),-9);
      ctx.lineTo(side+7*Math.cos(sp),-9);
      ctx.stroke();
      ctx.strokeStyle='rgba(255,255,255,.4)';
    }
    ctx.restore();
    return y;
  }

  /* ---------- الحلقة ---------- */
  function loop(now){
    raf=requestAnimationFrame(loop);
    if(!lastT)lastT=now;
    let dt=(now-lastT)/16.666;
    lastT=now;
    dt=Math.min(dt,2.5);

    /* --- تحديث --- */
    if(started&&!over){
      dist+=speed*dt;
      speed=Math.min(10,4.4+dist*0.00075);

      if(buffer>0)buffer-=dt;
      if(gear.onGround){coyote=COYOTE;jumpsUsed=0}
      else if(coyote>0)coyote-=dt;
      tryJump();

      const g=(holding&&gear.vy<0)?GRAV*0.82:(gear.vy>0?GRAV*1.12:GRAV);
      gear.vy+=g*dt;
      gear.y+=gear.vy*dt;
      if(gear.y>=GROUND){
        if(!gear.onGround){
          gear.squash=1;
          burst(gear.x,GROUND+4,5,'rgba(138,163,184,.7)',2);
          sfx.land();
        }
        gear.y=GROUND;gear.vy=0;gear.onGround=true;
      }
      gear.rot+=speed*0.05*dt;
      gear.squash*=Math.pow(0.85,dt);
      if(gear.inv>0)gear.inv-=dt;

      // مؤقتات القدرات
      if(magnetT>0)magnetT-=dt;
      if(x2T>0)x2T-=dt;

      trail.push({x:gear.x,y:gear.y});
      if(trail.length>18)trail.shift();

      farOff=(farOff+speed*0.25*dt)%(W*2);
      nearOff=(nearOff+speed*0.5*dt)%(W*2);

      // توليد
      spawnTimer-=speed*dt;
      const lastOb=obstacles[obstacles.length-1];
      const clear=!lastOb||(W+40-lastOb.x)>minGapPx();
      if(spawnTimer<=0&&clear){spawnObstacle();spawnTimer=40+Math.random()*70}
      boltTimer-=speed*dt;
      if(boltTimer<=0){spawnBolts();boltTimer=180+Math.random()*220}
      powerTimer-=speed*dt;
      if(powerTimer<=0){spawnPower();powerTimer=750+Math.random()*650}

      /* عوائق */
      for(let i=obstacles.length-1;i>=0;i--){
        const o=obstacles[i];
        o.x-=speed*dt;
        if(o.kind==='spike')o.rot-=speed*0.055*dt;
        if(o.kind==='drone')o.bob+=0.09*dt;

        if(!o.passed&&o.x+(o.w||o.r)<gear.x-gear.r){
          o.passed=true;
          addScore(1,gear.x,gear.y-34);
        }
        if(o.x<-90){obstacles.splice(i,1);continue}

        if(gear.inv>0)continue;
        const pad=5;
        let hit=false;
        if(o.kind==='box'){
          const top=GROUND+gear.r-o.h;
          const cx=Math.max(o.x,Math.min(gear.x,o.x+o.w));
          const cy=Math.max(top,Math.min(gear.y,GROUND+gear.r));
          const dx=gear.x-cx,dy=gear.y-cy;
          hit=dx*dx+dy*dy<(gear.r-pad)*(gear.r-pad);
        }else if(o.kind==='spike'){
          const oy=GROUND+gear.r-o.r;
          const dx=gear.x-o.x,dy=gear.y-oy;
          const rr=gear.r+o.r-pad*2;
          hit=dx*dx+dy*dy<rr*rr;
        }else{
          const oy=o.baseY+Math.sin(o.bob)*7;
          const dx=gear.x-o.x,dy=gear.y-oy;
          const rr=gear.r+o.r-pad*2;
          hit=dx*dx+dy*dy<rr*rr;
        }
        if(hit){
          if(shield){
            shield=false;
            gear.inv=40;
            obstacles.splice(i,1);
            shake=10;
            flash=.4;flashColor=ACCENT;
            burst(gear.x,gear.y,16,ACCENT,4);
            popup(gear.x,gear.y-38,'الدرع! 🛡',ACCENT,16);
            sfx.shieldPop();
            if(navigator.vibrate)navigator.vibrate(30);
          }else{
            gameOver();
          }
        }
      }

      /* صواميل */
      for(let i=bolts.length-1;i>=0;i--){
        const b=bolts[i];
        b.x-=speed*dt;
        b.rot+=0.06*dt;
        // مغناطيس
        if(magnetT>0){
          const dx=gear.x-b.x,dy=gear.y-b.y;
          const d2=dx*dx+dy*dy;
          if(d2<110*110){
            const d=Math.sqrt(d2)||1;
            b.x+=dx/d*5.5*dt;
            b.y+=dy/d*5.5*dt;
          }
        }
        const dx=gear.x-b.x,dy=gear.y-b.y;
        if(dx*dx+dy*dy<(gear.r+b.r)*(gear.r+b.r)){
          bolts.splice(i,1);
          runBolts++;totalBolts++;
          boltsEl.textContent=totalBolts;
          store.set('gj_bolts',totalBolts);
          addScore(1,b.x,b.y-14);
          burst(b.x,b.y,5,GOLD,2.2);
          sfx.bolt();
          continue;
        }
        if(b.x<-30)bolts.splice(i,1);
      }

      /* قدرات */
      for(let i=powerups.length-1;i>=0;i--){
        const p=powerups[i];
        p.x-=speed*dt;
        p.bob+=0.06*dt;
        const py=p.y+Math.sin(p.bob)*5;
        const dx=gear.x-p.x,dy=gear.y-py;
        if(dx*dx+dy*dy<(gear.r+p.r+4)*(gear.r+p.r+4)){
          powerups.splice(i,1);
          flash=.35;
          if(p.kind==='shield'){shield=true;flashColor=ACCENT;popup(p.x,py-16,'درع 🛡',ACCENT,16)}
          if(p.kind==='magnet'){magnetT=420;flashColor=ACCENT2;popup(p.x,py-16,'مغناطيس 🧲',ACCENT2,16)}
          if(p.kind==='x2'){x2T=480;flashColor=GOLD;popup(p.x,py-16,'نقاط ×2 ⭐',GOLD,16)}
          burst(p.x,py,12,flashColor,3.5);
          sfx.power();
          if(navigator.vibrate)navigator.vibrate(20);
          continue;
        }
        if(p.x<-30)powerups.splice(i,1);
      }
    }

    if(started&&!over)updateBiome(dt);
    shake*=Math.pow(0.85,dt);
    flash*=Math.pow(0.93,dt);

    /* --- رسم --- */
    ctx.save();
    if(shake>0.3)ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);

    // سماء (متغيرة حسب البيئة)
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,rgba(biomeCur.top,1));
    sky.addColorStop(1,rgba(biomeCur.bot,1));
    ctx.fillStyle=sky;
    ctx.fillRect(-12,-12,W+24,H+24);

    // نجوم
    for(const s of bgStars){
      s.tw+=0.03*s.sp*dt;
      ctx.globalAlpha=.25+Math.sin(s.tw)*.2;
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,TAU);ctx.fill();
    }
    ctx.globalAlpha=1;

    // قمر
    ctx.fillStyle='rgba(232,240,248,.1)';
    ctx.beginPath();ctx.arc(W*0.82,H*0.19,16,0,TAU);ctx.fill();
    ctx.fillStyle='rgba(232,240,248,.14)';
    ctx.beginPath();ctx.arc(W*0.82+3,H*0.19-2,12,0,TAU);ctx.fill();

    // خطوط سرعة
    if(speed>7&&started&&!over){
      ctx.strokeStyle='rgba(255,255,255,.06)';
      ctx.lineWidth=1.5;
      const k=(speed-7)/3;
      for(let i=0;i<5;i++){
        const y=(i/5)*GROUND+((dist*3+i*137)%40);
        const x=W-((dist*(6+i))% (W+120))+60;
        ctx.globalAlpha=k*.7;
        ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-34-k*30,y);ctx.stroke();
      }
      ctx.globalAlpha=1;
    }

    drawHills(hillsFar,farOff,GROUND+gear.r-6,rgba(biomeCur.far,.12));
    drawHills(hillsNear,nearOff,GROUND+gear.r-2,rgba(biomeCur.near,.12));

    // أرض
    const gy=GROUND+gear.r+2;
    ctx.strokeStyle='rgba(255,255,255,.16)';
    ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,.06)';
    const dashOff=dist%26;
    ctx.beginPath();
    for(let x=-dashOff;x<W;x+=26){ctx.moveTo(x,gy+7);ctx.lineTo(x+12,gy+7)}
    ctx.stroke();

    // ذيل
    const trailColor=x2T>0?GOLD:ACCENT;
    for(let i=0;i<trail.length;i++){
      const p=trail[i];
      ctx.globalAlpha=(i/trail.length)*.35;
      ctx.fillStyle=trailColor;
      ctx.beginPath();
      ctx.arc(p.x-(trail.length-i)*2.2,p.y,gear.r*(i/trail.length)*.55,0,TAU);
      ctx.fill();
    }
    ctx.globalAlpha=1;

    // حلقات القفزة المزدوجة
    for(let i=rings.length-1;i>=0;i--){
      const r=rings[i];
      r.r+=2.4*dt;r.life-=0.06*dt;
      if(r.life<=0){rings.splice(i,1);continue}
      ctx.globalAlpha=r.life*.6;
      ctx.strokeStyle=ACCENT;
      ctx.lineWidth=2;
      ctx.beginPath();ctx.ellipse(r.x,r.y,r.r,r.r*.4,0,0,TAU);ctx.stroke();
    }
    ctx.globalAlpha=1;

    // صواميل
    for(const b of bolts){
      ctx.save();
      ctx.shadowColor='rgba(255,209,102,.45)';ctx.shadowBlur=8;
      drawHex(b.x,b.y,b.r,b.rot,GOLD);
      ctx.restore();
    }

    // قدرات
    for(const p of powerups){
      const py=p.y+Math.sin(p.bob)*5;
      ctx.save();
      const col=p.kind==='shield'?ACCENT:p.kind==='magnet'?ACCENT2:GOLD;
      ctx.shadowColor=col;ctx.shadowBlur=14;
      ctx.fillStyle='rgba(10,19,32,.9)';
      ctx.strokeStyle=col;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(p.x,py,p.r+3,0,TAU);ctx.fill();ctx.stroke();
      ctx.shadowBlur=0;
      ctx.font='13px sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(p.kind==='shield'?'🛡':p.kind==='magnet'?'🧲':'⭐',p.x,py+1);
      ctx.restore();
    }
    ctx.textBaseline='alphabetic';

    // عوائق
    for(const o of obstacles){
      if(o.kind==='box'){
        const top=GROUND+gear.r-o.h;
        const grad=ctx.createLinearGradient(o.x,top,o.x,GROUND+gear.r);
        grad.addColorStop(0,'rgba(147,158,255,.95)');
        grad.addColorStop(1,'rgba(107,116,222,.85)');
        ctx.fillStyle=grad;
        ctx.beginPath();ctx.roundRect(o.x,top,o.w,o.h,5);ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.2)';
        ctx.beginPath();ctx.roundRect(o.x+3,top+3,o.w-6,3,2);ctx.fill();
      }else if(o.kind==='spike'){
        drawGearShape(o.x,GROUND+gear.r-o.r,o.r,o.rot,PINK,7,'rgba(244,114,182,.4)');
      }else{
        drawDrone(o);
      }
    }

    // جزيئات
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=0.15*dt;p.life-=0.035*dt;
      if(p.life<=0){particles.splice(i,1);continue}
      ctx.globalAlpha=p.life;
      ctx.fillStyle=p.color;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,TAU);ctx.fill();
    }
    ctx.globalAlpha=1;

    // اللاعب
    const blink=gear.inv>0&&((gear.inv|0)%8<4);
    if(!blink){
      ctx.save();
      ctx.translate(gear.x,gear.y);
      const sq=gear.squash;
      ctx.scale(1+sq*0.14,1-sq*0.14);
      ctx.translate(-gear.x,-gear.y);
      drawGearShape(gear.x,gear.y,gear.r,gear.rot,x2T>0?GOLD:ACCENT,8,x2T>0?'rgba(255,209,102,.6)':'rgba(94,234,212,.55)');
      ctx.restore();
      // هالة الدرع
      if(shield){
        ctx.strokeStyle='rgba(94,234,212,.7)';
        ctx.lineWidth=2;
        ctx.setLineDash([6,5]);
        ctx.lineDashOffset=-dist*.5;
        ctx.beginPath();ctx.arc(gear.x,gear.y,gear.r+8,0,TAU);ctx.stroke();
        ctx.setLineDash([]);
      }
    }

    // HUD القدرات (يسار فوق — مناسب للـRTL)
    let hudX=14;
    const hudY=16;
    if(shield){drawHUD(hudX,hudY,'🛡',ACCENT,1);hudX+=48}
    if(magnetT>0){drawHUD(hudX,hudY,'🧲',ACCENT2,magnetT/420);hudX+=48}
    if(x2T>0){drawHUD(hudX,hudY,'⭐',GOLD,x2T/480)}

    // نصوص عائمة
    for(let i=popups.length-1;i>=0;i--){
      const p=popups[i];
      p.y-=0.7*dt;p.life-=0.023*dt;
      if(p.life<=0){popups.splice(i,1);continue}
      ctx.globalAlpha=Math.min(1,p.life*1.4);
      ctx.fillStyle=p.color;
      ctx.font=`700 ${p.size}px "IBM Plex Sans Arabic",sans-serif`;
      ctx.textAlign='center';
      ctx.fillText(p.txt,p.x,p.y);
    }
    ctx.globalAlpha=1;

    // وميض
    if(flash>0.02){
      ctx.fillStyle=flashColor;
      ctx.globalAlpha=flash*0.13;
      ctx.fillRect(-12,-12,W+24,H+24);
      ctx.globalAlpha=1;
    }

    // شاشات الحالة
    ctx.textAlign='center';
    if(!started){
      ctx.fillStyle='rgba(232,240,248,.95)';
      ctx.font='700 18px "IBM Plex Sans Arabic",sans-serif';
      ctx.fillText('اضغط للبدء',W/2,H/2-24);
      ctx.fillStyle=DIM;
      ctx.font='300 12.5px "IBM Plex Sans Arabic",sans-serif';
      ctx.fillText('قفزة مزدوجة بالهواء • اجمع 🔩 والقدرات • احذر الدرون',W/2,H/2+2);
      ctx.fillText('ضغطة مطوّلة = قفزة أعلى',W/2,H/2+22);
    }else if(over){
      ctx.fillStyle='rgba(6,10,17,.62)';
      ctx.fillRect(0,0,W,H);
      // لوحة النتائج
      const pw=Math.min(300,W-60),ph=132;
      const px=(W-pw)/2,pyy=(H-ph)/2-6;
      ctx.fillStyle='rgba(16,26,42,.95)';
      ctx.strokeStyle='rgba(255,255,255,.12)';
      ctx.lineWidth=1;
      ctx.beginPath();ctx.roundRect(px,pyy,pw,ph,14);ctx.fill();ctx.stroke();
      ctx.fillStyle='rgba(232,240,248,.97)';
      ctx.font='700 19px "IBM Plex Sans Arabic",sans-serif';
      ctx.fillText('انتهت الجولة!',W/2,pyy+30);
      ctx.font='400 13.5px "IBM Plex Sans Arabic",sans-serif';
      ctx.fillStyle=ACCENT;
      ctx.fillText('النقاط: '+score+'   •   🔩 '+runBolts,W/2,pyy+58);
      ctx.fillStyle=DIM;
      ctx.font='300 12.5px "IBM Plex Sans Arabic",sans-serif';
      ctx.fillText('المسافة: '+(dist/40|0)+' م   •   الأفضل: '+best,W/2,pyy+82);
      ctx.fillStyle='rgba(232,240,248,.85)';
      ctx.font='400 13px "IBM Plex Sans Arabic",sans-serif';
      ctx.fillText('اضغط للمحاولة مرة ثانية',W/2,pyy+110);
    }

    ctx.restore();
  }

  function drawHUD(x,y,icon,color,frac){
    ctx.save();
    ctx.fillStyle='rgba(10,19,32,.75)';
    ctx.strokeStyle=color;
    ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(x,y,42,22,8);ctx.fill();ctx.stroke();
    ctx.font='11px sans-serif';
    ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText(icon,x+5,y+12);
    // شريط المدة
    ctx.fillStyle=color;
    ctx.globalAlpha=.9;
    ctx.beginPath();ctx.roundRect(x+22,y+8,16*Math.max(0,Math.min(1,frac)),6,3);ctx.fill();
    ctx.restore();
    ctx.textBaseline='alphabetic';
  }

  function drawHills(list,off,base,color){
    ctx.fillStyle=color;
    for(const h of list){
      let x=h.x-off;
      if(x<-h.w)x+=W*2;
      ctx.beginPath();
      ctx.moveTo(x,base);
      ctx.quadraticCurveTo(x+h.w/2,base-h.h,x+h.w,base);
      ctx.closePath();ctx.fill();
    }
  }

  function gameOver(){
    over=true;
    shake=15;
    flash=.5;flashColor=RED;
    burst(gear.x,gear.y,18,ACCENT,4.5);
    burst(gear.x,gear.y,12,ACCENT2,4);
    burst(gear.x,gear.y,8,PINK,3.5);
    sfx.hit();
    if(score>0&&score>=best){
      hintEl.classList.add('gold');
      hintEl.textContent='🏆 رقم قياسي جديد: '+score;
    }else{
      hintEl.classList.remove('gold');
      hintEl.textContent='اضغط للمحاولة مرة ثانية';
    }
    if(navigator.vibrate)navigator.vibrate([40,50,40]);
  }

  /* ---------- التحكم ---------- */
  canvas.addEventListener('pointerdown',e=>{e.preventDefault();pressDown()});
  canvas.addEventListener('pointerup',e=>{e.preventDefault();pressUp()});
  canvas.addEventListener('pointercancel',pressUp);
  canvas.addEventListener('contextmenu',e=>e.preventDefault());
  document.addEventListener('keydown',e=>{
    if(!running)return;
    if(e.code==='Space'||e.code==='ArrowUp'){
      e.preventDefault();
      if(!e.repeat)pressDown();
    }
    if(e.code==='Escape')closeGame();
    if(e.code==='KeyM')muteBtn.click();
  });
  document.addEventListener('keyup',e=>{
    if(!running)return;
    if(e.code==='Space'||e.code==='ArrowUp')pressUp();
  });

  /* ---------- فتح/إغلاق ---------- */
  function openGame(){
    overlay.classList.add('open');
    running=true;
    resize();
    reset();
    rings=[];
    lastT=0;
    cancelAnimationFrame(raf);
    raf=requestAnimationFrame(loop);
    closeBtn.focus();
  }
  function closeGame(){
    overlay.classList.remove('open');
    running=false;
    cancelAnimationFrame(raf);
    playBtn.focus();
  }
  playBtn.addEventListener('click',openGame);
  closeBtn.addEventListener('click',closeGame);
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeGame()});
  addEventListener('resize',()=>{if(running)resize()});
  document.addEventListener('visibilitychange',()=>{lastT=0});
})();
</script>

</body>
</html>
